name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt
      - name: Black
        run: .venv/bin/black --check app/ tests/
      - name: isort
        run: .venv/bin/isort --check-only app/ tests/
      - name: Pytest with service coverage
        run: .venv/bin/pytest -q --cov=app/services --cov-report=term --cov-fail-under=80

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prettier (changed chart components)
        run: npx prettier --check "src/components/charts/**/*.{js,jsx}" "src/components/EDADashboard.jsx" "src/pages/BusinessDashboardPage.jsx"
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --run
      - name: Build
        run: npm run build
